<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camping - 露營旅遊預訂平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script type="module" crossorigin src="./assets/index-BJiIS0NR.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/rolldown-runtime-Cr0BHlHC.js">
    <link rel="modulepreload" crossorigin href="./assets/vendor-JJQFPHdA.js">
    <link rel="stylesheet" crossorigin href="./assets/index-BQqgxKSf.css">

    <style>
      /* ── Auth Modal ── */
      #camp-auth-modal {
        display: none; position: fixed; inset: 0; z-index: 9999;
        background: rgba(0,0,0,0.55); align-items: center; justify-content: center;
      }
      #camp-auth-modal.open { display: flex; }
      #camp-auth-box {
        background: #fff; border-radius: 12px; padding: 36px 32px;
        width: 360px; max-width: 95vw; box-shadow: 0 8px 40px rgba(0,0,0,0.18);
        position: relative; font-family: 'Open Sans', sans-serif;
      }
      #camp-auth-box h2 { margin: 0 0 20px; font-size: 1.4rem; color: #2d6a4f; }
      #camp-auth-box .tab-btns { display: flex; gap: 8px; margin-bottom: 20px; }
      #camp-auth-box .tab-btn {
        flex: 1; padding: 8px; border: 2px solid #2d6a4f; border-radius: 6px;
        background: #fff; color: #2d6a4f; cursor: pointer; font-size: 0.95rem; font-weight: 600;
      }
      #camp-auth-box .tab-btn.active { background: #2d6a4f; color: #fff; }
      #camp-auth-box input {
        width: 100%; box-sizing: border-box; padding: 10px 12px; margin-bottom: 12px;
        border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem;
      }
      #camp-auth-box .auth-submit {
        width: 100%; padding: 11px; background: #2d6a4f; color: #fff;
        border: none; border-radius: 6px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 4px;
      }
      #camp-auth-box .auth-submit:hover { background: #1b4332; }
      #camp-auth-box .auth-msg { margin-top: 10px; font-size: 0.88rem; min-height: 20px; }
      #camp-auth-box .auth-msg.err { color: #c0392b; }
      #camp-auth-box .auth-msg.ok { color: #2d6a4f; }
      #camp-auth-close {
        position: absolute; top: 12px; right: 16px; font-size: 1.3rem;
        background: none; border: none; cursor: pointer; color: #666;
      }

      /* ── User Bar ── */
      #camp-user-bar {
        position: fixed; top: 0; right: 0; z-index: 9998;
        background: #2d6a4f; color: #fff; padding: 6px 16px;
        font-size: 0.85rem; font-family: 'Open Sans', sans-serif;
        border-bottom-left-radius: 8px; display: none; align-items: center; gap: 10px;
      }
      #camp-user-bar.show { display: flex; }
      .camp-bar-btn {
        background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5);
        color: #fff; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 0.82rem;
      }
      .camp-bar-btn:hover { background: rgba(255,255,255,0.35); }

      /* ── Common Modal ── */
      .camp-modal-overlay {
        display: none; position: fixed; inset: 0; z-index: 9997;
        background: rgba(0,0,0,0.6); align-items: flex-start;
        justify-content: center; overflow-y: auto; padding: 40px 16px;
      }
      .camp-modal-overlay.open { display: flex; }
      .camp-modal-box {
        background: #fff; border-radius: 16px; padding: 32px;
        width: 100%; max-width: 900px; font-family: 'Open Sans', sans-serif;
        position: relative; margin-bottom: 40px;
      }
      .camp-modal-box h2 { margin: 0 0 20px; font-size: 1.4rem; color: #333; }
      .camp-modal-close {
        position: absolute; top: 16px; right: 16px; background: none;
        border: none; font-size: 1.3rem; cursor: pointer; color: #666;
      }
      .camp-empty { color: #888; padding: 20px 0; text-align: center; }
      .camp-error { color: #c0392b; padding: 12px; }

      /* ── Spot Cards ── */
      .camp-spot-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px;
      }
      .camp-spot-card {
        border: 1px solid #eee; border-radius: 12px; overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07); transition: box-shadow 0.2s;
      }
      .camp-spot-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.14); }
      .camp-spot-card img { width: 100%; height: 160px; object-fit: cover; }
      .camp-spot-card-body { padding: 16px; }
      .camp-spot-card-body h3 { margin: 0 0 8px; font-size: 16px; color: #333; }
      .camp-spot-card-body p { margin: 0 0 12px; font-size: 13px; color: #666; line-height: 1.5; }
      .camp-spot-card-actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
      .camp-price-tag {
        background: #ff6b35; color: #fff; padding: 4px 12px;
        border-radius: 20px; font-size: 13px; font-weight: 600;
      }
      .camp-btn-fav {
        background: none; border: 1.5px solid #e74c3c; color: #e74c3c;
        padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
        transition: all 0.2s;
      }
      .camp-btn-fav:hover, .camp-btn-fav.active { background: #e74c3c; color: #fff; }
      .camp-btn-book {
        background: #2d6a4f; color: #fff; border: none;
        padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
        transition: background 0.2s; margin-left: auto;
      }
      .camp-btn-book:hover { background: #1b4332; }

      /* ── Booking Modal ── */
      #camp-book-modal { z-index: 10000; }
      #camp-book-box { max-width: 480px; }
      .book-field { margin-bottom: 16px; }
      .book-field label { display: block; font-size: 0.88rem; color: #555; margin-bottom: 5px; font-weight: 600; }
      .book-field input[type=date], .book-field input[type=text] {
        width: 100%; box-sizing: border-box; padding: 9px 12px;
        border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem;
      }
      .book-summary {
        background: #f8f9fa; border-radius: 8px; padding: 14px 16px; margin: 16px 0;
        font-size: 0.9rem; line-height: 1.8;
      }
      .book-summary .sum-row { display: flex; justify-content: space-between; }
      .book-summary .sum-total { font-weight: 700; color: #2d6a4f; font-size: 1rem; }
      #camp-book-submit {
        width: 100%; padding: 12px; background: #2d6a4f; color: #fff;
        border: none; border-radius: 8px; font-size: 1rem; font-weight: 700;
        cursor: pointer; margin-top: 4px;
      }
      #camp-book-submit:hover { background: #1b4332; }
      #camp-book-msg { margin-top: 10px; font-size: 0.88rem; min-height: 20px; }
      #camp-book-msg.err { color: #c0392b; }
      #camp-book-msg.ok { color: #2d6a4f; }

      /* ── Orders & Favorites lists ── */
      .camp-list-item {
        border: 1px solid #eee; border-radius: 10px; padding: 16px 20px;
        margin-bottom: 12px; font-size: 0.9rem; line-height: 1.7;
      }
      .camp-list-item h4 { margin: 0 0 8px; font-size: 1rem; color: #333; }
      .camp-badge {
        display: inline-block; padding: 2px 10px; border-radius: 12px;
        font-size: 0.78rem; font-weight: 600;
      }
      .badge-green { background: #d4edda; color: #155724; }
      .badge-gray  { background: #e9ecef; color: #495057; }
      .badge-red   { background: #f8d7da; color: #721c24; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- User Bar -->
    <div id="camp-user-bar">
      <span id="camp-user-name"></span>
      <button class="camp-bar-btn" id="camp-favorites-btn">❤ 我的收藏</button>
      <button class="camp-bar-btn" id="camp-coupons-btn">🎫 我的優惠券</button>
      <button class="camp-bar-btn" id="camp-orders-btn">📋 我的訂單</button>
      <button class="camp-bar-btn" id="camp-logout-btn">登出</button>
    </div>

    <!-- Auth Modal -->
    <div id="camp-auth-modal">
      <div id="camp-auth-box">
        <button id="camp-auth-close">✕</button>
        <h2 id="camp-auth-title">登入</h2>
        <div class="tab-btns">
          <button class="tab-btn active" id="tab-login">登入</button>
          <button class="tab-btn" id="tab-register">註冊</button>
        </div>
        <div id="camp-login-form">
          <input type="email" id="login-email" placeholder="Email" />
          <input type="password" id="login-password" placeholder="密碼" />
          <button class="auth-submit" id="do-login">登入</button>
        </div>
        <div id="camp-register-form" style="display:none">
          <input type="text" id="reg-name" placeholder="姓名" />
          <input type="email" id="reg-email" placeholder="Email" />
          <input type="password" id="reg-password" placeholder="密碼（至少 6 字元）" />
          <button class="auth-submit" id="do-register">註冊</button>
        </div>
        <div class="auth-msg" id="auth-msg"></div>
      </div>
    </div>

    <!-- Browse Spots Modal -->
    <div id="camp-browse-modal" class="camp-modal-overlay">
      <div class="camp-modal-box">
        <button class="camp-modal-close" id="camp-browse-close">✕</button>
        <h2>全部景點</h2>
        <div id="camp-browse-list" class="camp-spot-grid">
          <p style="color:#888;">載入中...</p>
        </div>
      </div>
    </div>

    <!-- Favorites Modal -->
    <div id="camp-fav-modal" class="camp-modal-overlay">
      <div class="camp-modal-box">
        <button class="camp-modal-close" id="camp-fav-close">✕</button>
        <h2>❤ 我的收藏紀錄</h2>
        <div id="camp-fav-list"><p class="camp-empty">載入中...</p></div>
      </div>
    </div>

    <!-- Orders Modal -->
    <div id="camp-orders-modal" class="camp-modal-overlay">
      <div class="camp-modal-box">
        <button class="camp-modal-close" id="camp-orders-close">✕</button>
        <h2>📋 我的訂單</h2>
        <div id="camp-orders-list"><p class="camp-empty">載入中...</p></div>
      </div>
    </div>

    <!-- Coupons Modal -->
    <div id="camp-coupons-modal" class="camp-modal-overlay">
      <div class="camp-modal-box">
        <button class="camp-modal-close" id="camp-coupons-close">✕</button>
        <h2>🎫 我的優惠券</h2>
        <div id="camp-coupons-list"><p class="camp-empty">載入中...</p></div>
      </div>
    </div>

    <!-- Booking Modal -->
    <div id="camp-book-modal" class="camp-modal-overlay">
      <div class="camp-modal-box" id="camp-book-box">
        <button class="camp-modal-close" id="camp-book-close">✕</button>
        <h2 id="camp-book-title">預訂景點</h2>
        <div class="book-field">
          <label>入住日期</label>
          <input type="date" id="book-checkin" />
        </div>
        <div class="book-field">
          <label>退房日期（可選多天）</label>
          <input type="date" id="book-checkout" />
        </div>
        <div class="book-field">
          <label>優惠券代碼（選填）</label>
          <input type="text" id="book-coupon" placeholder="輸入優惠券代碼" />
        </div>
        <div class="book-summary" id="book-summary">
          <div class="sum-row"><span>住宿天數</span><span id="sum-nights">—</span></div>
          <div class="sum-row"><span>每晚價格</span><span id="sum-unit">—</span></div>
          <div class="sum-row"><span>小計</span><span id="sum-total">—</span></div>
          <div class="sum-row"><span>優惠券折扣</span><span id="sum-discount">—</span></div>
          <div class="sum-row sum-total"><span>應付金額</span><span id="sum-final">—</span></div>
        </div>
        <button id="camp-book-submit">確認預訂</button>
        <div id="camp-book-msg"></div>
      </div>
    </div>

    <script>
    (function () {
      const BASE = (() => {
        const parts = window.location.pathname.split('/').filter(Boolean);
        const ctx = parts.length > 0 ? '/' + parts[0] : '';
        return window.location.origin + ctx + '/api';
      })();

      // ── Patch fetch: auto-attach Bearer token ──
      const _fetch = window.fetch;
      window.fetch = function (url, opts) {
        opts = opts || {};
        const token = localStorage.getItem('camping_token');
        if (token && typeof url === 'string' && url.includes('/api/')) {
          opts.headers = Object.assign({ 'Authorization': 'Bearer ' + token }, opts.headers || {});
        }
        return _fetch(url, opts);
      };

      // ── Auth helpers ──
      function showModal() { document.getElementById('camp-auth-modal').classList.add('open'); }
      function hideModal() {
        document.getElementById('camp-auth-modal').classList.remove('open');
        document.getElementById('auth-msg').textContent = '';
        document.getElementById('auth-msg').className = 'auth-msg';
      }
      function setMsg(text, isErr) {
        const el = document.getElementById('auth-msg');
        el.textContent = text;
        el.className = 'auth-msg ' + (isErr ? 'err' : 'ok');
      }
      function isLoggedIn() { return !!localStorage.getItem('camping_token'); }
      function updateUserBar() {
        const name = localStorage.getItem('camping_user_name');
        const bar = document.getElementById('camp-user-bar');
        if (name) {
          document.getElementById('camp-user-name').textContent = '👤 ' + name;
          bar.classList.add('show');
        } else {
          bar.classList.remove('show');
        }
      }

      // ── Tab switching ──
      document.getElementById('tab-login').onclick = function () {
        this.classList.add('active');
        document.getElementById('tab-register').classList.remove('active');
        document.getElementById('camp-login-form').style.display = '';
        document.getElementById('camp-register-form').style.display = 'none';
        document.getElementById('camp-auth-title').textContent = '登入';
        setMsg('', false);
      };
      document.getElementById('tab-register').onclick = function () {
        this.classList.add('active');
        document.getElementById('tab-login').classList.remove('active');
        document.getElementById('camp-register-form').style.display = '';
        document.getElementById('camp-login-form').style.display = 'none';
        document.getElementById('camp-auth-title').textContent = '註冊';
        setMsg('', false);
      };
      document.getElementById('camp-auth-close').onclick = hideModal;
      document.getElementById('camp-auth-modal').onclick = function (e) { if (e.target === this) hideModal(); };

      // ── Login ──
      document.getElementById('do-login').onclick = async function () {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        if (!email || !password) { setMsg('請填寫 Email 與密碼', true); return; }
        try {
          const res = await _fetch(BASE + '/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (!res.ok) { setMsg(data.error || data.detail || '登入失敗', true); return; }
          localStorage.setItem('camping_token', data.token);
          localStorage.setItem('camping_user_name', data.name);
          localStorage.setItem('camping_user_email', data.email);
          setMsg('登入成功！', false);
          updateUserBar();
          setTimeout(hideModal, 800);
        } catch (e) { setMsg('登入失敗：' + e.message, true); }
      };

      // ── Register ──
      document.getElementById('do-register').onclick = async function () {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        if (!name || !email || !password) { setMsg('請填寫所有欄位', true); return; }
        try {
          const res = await _fetch(BASE + '/auth/register', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
          });
          const data = await res.json();
          if (!res.ok) { setMsg(data.error || data.detail || '註冊失敗', true); return; }
          localStorage.setItem('camping_token', data.token);
          localStorage.setItem('camping_user_name', data.name);
          localStorage.setItem('camping_user_email', data.email);
          setMsg('註冊成功！', false);
          updateUserBar();
          setTimeout(hideModal, 800);
        } catch (e) { setMsg('註冊失敗：' + e.message, true); }
      };

      // ── Logout ──
      document.getElementById('camp-logout-btn').onclick = async function () {
        const token = localStorage.getItem('camping_token');
        if (token) {
          await _fetch(BASE + '/auth/logout', {
            method: 'POST', headers: { 'Authorization': 'Bearer ' + token }
          }).catch(() => {});
        }
        localStorage.removeItem('camping_token');
        localStorage.removeItem('camping_user_name');
        localStorage.removeItem('camping_user_email');
        updateUserBar();
      };

      // ── Modal open/close helpers ──
      function openOverlay(id) { document.getElementById(id).classList.add('open'); }
      function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
      ['camp-browse-modal','camp-fav-modal','camp-coupons-modal','camp-orders-modal','camp-book-modal'].forEach(function(id) {
        document.getElementById(id).addEventListener('click', function(e) { if (e.target === this) closeOverlay(id); });
      });
      document.getElementById('camp-browse-close').onclick = function() { closeOverlay('camp-browse-modal'); };
      document.getElementById('camp-fav-close').onclick = function() { closeOverlay('camp-fav-modal'); };
      document.getElementById('camp-coupons-close').onclick = function() { closeOverlay('camp-coupons-modal'); };
      document.getElementById('camp-orders-close').onclick = function() { closeOverlay('camp-orders-modal'); };
      document.getElementById('camp-book-close').onclick = function() { closeOverlay('camp-book-modal'); };

      // ── Browse Spots ──
      var _spotsCache = null;
      async function openBrowseModal() {
        openOverlay('camp-browse-modal');
        if (_spotsCache) { renderSpots(_spotsCache); return; }
        document.getElementById('camp-browse-list').innerHTML = '<p style="color:#888;">載入中...</p>';
        try {
          const r = await window.fetch(BASE + '/spot');
          const resp = await r.json();
          _spotsCache = resp.data || [];
          renderSpots(_spotsCache);
        } catch (err) {
          document.getElementById('camp-browse-list').innerHTML = '<p class="camp-error">載入失敗：' + err.message + '</p>';
        }
      }

      function renderSpots(spots) {
        const list = document.getElementById('camp-browse-list');
        if (!spots.length) { list.innerHTML = '<p class="camp-empty">目前沒有景點資料。</p>'; return; }
        list.className = 'camp-spot-grid';
        list.innerHTML = spots.map(function(s) {
          return '<div class="camp-spot-card" data-spot-id="' + s.spot_id + '" data-spot-name="' + s.spot_name + '" data-price="' + s.price + '">'
            + '<img src="' + s.spot_img_url + '" alt="' + s.spot_name + '" onerror="this.style.display=\'none\'">'
            + '<div class="camp-spot-card-body">'
            + '<h3>' + s.spot_name + '</h3>'
            + '<p>' + s.describe + '</p>'
            + '<span class="camp-price-tag">$' + s.price + ' / 每晚</span>'
            + '<div class="camp-spot-card-actions">'
            + '<button class="camp-btn-fav" data-spot-id="' + s.spot_id + '" data-spot-name="' + s.spot_name + '">❤ 收藏</button>'
            + '<button class="camp-btn-book" data-spot-id="' + s.spot_id + '" data-spot-name="' + s.spot_name + '" data-price="' + s.price + '">📅 預訂</button>'
            + '</div></div></div>';
        }).join('');

        // Bind buttons
        list.querySelectorAll('.camp-btn-fav').forEach(function(btn) {
          btn.onclick = function() { handleFavorite(btn.dataset.spotId, btn.dataset.spotName, btn); };
        });
        list.querySelectorAll('.camp-btn-book').forEach(function(btn) {
          btn.onclick = function() { openBookModal(btn.dataset.spotId, btn.dataset.spotName, parseInt(btn.dataset.price)); };
        });
      }

      // ── Favorite ──
      async function handleFavorite(spotId, spotName, btn) {
        if (!isLoggedIn()) { showModal(); return; }
        const isFav = btn.classList.contains('active');
        try {
          btn.disabled = true;
          const res = await window.fetch(BASE + '/favorites', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ spot_id: spotId, spot_name: spotName, is_favorite: !isFav })
          });
          const data = await res.json();
          if (!res.ok) { alert(data.error || '操作失敗'); return; }
          btn.classList.toggle('active');
          btn.textContent = btn.classList.contains('active') ? '❤ 已收藏' : '❤ 收藏';
          if (!isFav && data.coupon) {
            showToast('收藏成功！優惠券：' + data.coupon.coupon_code + '（折抵 $' + data.coupon.discount_amount + '）');
          }
        } catch(e) { alert('操作失敗：' + e.message); }
        finally { btn.disabled = false; }
      }

      // ── Favorites List ──
      document.getElementById('camp-favorites-btn').onclick = async function() {
        if (!isLoggedIn()) { showModal(); return; }
        openOverlay('camp-fav-modal');
        document.getElementById('camp-fav-list').innerHTML = '<p class="camp-empty">載入中...</p>';
        try {
          const res = await window.fetch(BASE + '/favorites/history');
          const data = await res.json();
          const favs = data.favorites || [];
          if (!favs.length) {
            document.getElementById('camp-fav-list').innerHTML = '<p class="camp-empty">還沒有收藏紀錄</p>';
            return;
          }
          document.getElementById('camp-fav-list').innerHTML = favs.map(function(f) {
            const badge = f.active
              ? '<span class="camp-badge badge-green">收藏中</span>'
              : '<span class="camp-badge badge-gray">已取消</span>';
            const date = f.created_at ? new Date(f.created_at).toLocaleDateString('zh-TW') : '—';
            const cancelDate = f.canceled_at ? new Date(f.canceled_at).toLocaleDateString('zh-TW') : null;
            return '<div class="camp-list-item">'
              + '<h4>' + (f.spot_name || f.spot_id) + '  ' + badge + '</h4>'
              + '<div>收藏日期：' + date + '</div>'
              + (cancelDate ? '<div>取消日期：' + cancelDate + '</div>' : '')
              + '</div>';
          }).join('');
        } catch(e) {
          document.getElementById('camp-fav-list').innerHTML = '<p class="camp-error">載入失敗：' + e.message + '</p>';
        }
      };

      // ── Coupons List ──
      document.getElementById('camp-coupons-btn').onclick = async function() {
        if (!isLoggedIn()) { showModal(); return; }
        openOverlay('camp-coupons-modal');
        document.getElementById('camp-coupons-list').innerHTML = '<p class="camp-empty">載入中...</p>';
        try {
          const res = await window.fetch(BASE + '/coupons');
          const data = await res.json();
          const coupons = data.coupons || [];
          if (!coupons.length) {
            document.getElementById('camp-coupons-list').innerHTML = '<p class="camp-empty">還沒有優惠券</p>';
            return;
          }
          document.getElementById('camp-coupons-list').innerHTML = coupons.map(function(c) {
            const now = Date.now();
            const isExpired = c.expires_at && c.expires_at < now;
            const statusLabel = c.status === 'USED' ? '<span class="camp-badge badge-gray">已使用</span>'
              : isExpired ? '<span class="camp-badge badge-red">已過期</span>'
              : '<span class="camp-badge badge-green">可使用</span>';
            const expDate = c.expires_at ? new Date(c.expires_at).toLocaleDateString('zh-TW') : '—';
            const creDate = c.created_at ? new Date(c.created_at).toLocaleDateString('zh-TW') : '—';
            return '<div class="camp-list-item">'
              + '<h4><code style="font-size:1.05rem;letter-spacing:1px">' + c.coupon_code + '</code>  ' + statusLabel + '</h4>'
              + '<div>景點：' + (c.spot_name || c.spot_id || '—') + '  折扣：<strong>-$' + c.discount_amount + '</strong></div>'
              + '<div>有效期限：' + expDate + '  |  發放日期：' + creDate + '</div>'
              + (c.order_id ? '<div style="color:#999;font-size:0.82rem">使用於訂單：' + c.order_id + '</div>' : '')
              + '</div>';
          }).join('');
        } catch(e) {
          document.getElementById('camp-coupons-list').innerHTML = '<p class="camp-error">載入失敗：' + e.message + '</p>';
        }
      };

      // ── Orders List ──
      document.getElementById('camp-orders-btn').onclick = async function() {
        if (!isLoggedIn()) { showModal(); return; }
        openOverlay('camp-orders-modal');
        document.getElementById('camp-orders-list').innerHTML = '<p class="camp-empty">載入中...</p>';
        try {
          const res = await window.fetch(BASE + '/orders');
          const data = await res.json();
          const orders = data.orders || [];
          if (!orders.length) {
            document.getElementById('camp-orders-list').innerHTML = '<p class="camp-empty">還沒有訂單記錄</p>';
            return;
          }
          document.getElementById('camp-orders-list').innerHTML = orders.map(function(o) {
            const date = o.created_at ? new Date(o.created_at).toLocaleDateString('zh-TW') : '—';
            const checkIn  = o.check_in_date  || '—';
            const checkOut = o.check_out_date || '—';
            const nights   = o.nights || 1;
            const discount = o.discount_amount > 0 ? '折扣 -$' + o.discount_amount + '  ' : '';
            return '<div class="camp-list-item">'
              + '<h4>' + (o.spot_name || o.spot_id) + '  <span class="camp-badge badge-green">' + (o.status || 'confirmed') + '</span></h4>'
              + '<div>入住：' + checkIn + '  退房：' + checkOut + '  (' + nights + ' 晚)</div>'
              + '<div>每晚 $' + o.unit_price + '  小計 $' + o.total + '  ' + discount + '<strong>應付 $' + o.final_total + '</strong></div>'
              + (o.coupon_code ? '<div>使用優惠券：' + o.coupon_code + '</div>' : '')
              + '<div style="color:#999;font-size:0.82rem">訂單編號：' + (o.order_id || '—') + '  |  建立：' + date + '</div>'
              + '</div>';
          }).join('');
        } catch(e) {
          document.getElementById('camp-orders-list').innerHTML = '<p class="camp-error">載入失敗：' + e.message + '</p>';
        }
      };

      // ── Booking Modal ──
      var _bookSpot = {};
      function toDateStr(d) { return d.toISOString().split('T')[0]; }
      function openBookModal(spotId, spotName, unitPrice) {
        if (!isLoggedIn()) { showModal(); return; }
        _bookSpot = { spotId, spotName, unitPrice };
        document.getElementById('camp-book-title').textContent = '預訂：' + spotName;
        document.getElementById('book-coupon').value = '';
        document.getElementById('camp-book-msg').textContent = '';
        document.getElementById('camp-book-msg').className = '';

        // Default: checkin = tomorrow, checkout = day after tomorrow
        const today = new Date();
        const d1 = new Date(today); d1.setDate(d1.getDate() + 1);
        const d2 = new Date(today); d2.setDate(d2.getDate() + 2);
        const todayStr = toDateStr(today);
        const d1Str = toDateStr(d1);
        const d2Str = toDateStr(d2);

        const ciEl = document.getElementById('book-checkin');
        const coEl = document.getElementById('book-checkout');
        ciEl.min = todayStr;
        ciEl.value = d1Str;
        coEl.min = d1Str;  // checkout must be after checkin
        coEl.value = d2Str;
        updateBookSummary();
        openOverlay('camp-book-modal');
      }

      function updateBookSummary() {
        const ci = document.getElementById('book-checkin').value;
        const co = document.getElementById('book-checkout').value;
        // Update checkout min whenever checkin changes
        if (ci) {
          const coEl = document.getElementById('book-checkout');
          coEl.min = ci;
          if (coEl.value && coEl.value <= ci) {
            const next = new Date(ci); next.setDate(next.getDate() + 1);
            coEl.value = toDateStr(next);
          }
        }
        if (!ci || !co) { return; }
        const nights = Math.max(1, Math.round((new Date(co) - new Date(ci)) / 86400000));
        const total = _bookSpot.unitPrice * nights;
        document.getElementById('sum-nights').textContent = nights + ' 晚';
        document.getElementById('sum-unit').textContent = '$' + _bookSpot.unitPrice;
        document.getElementById('sum-total').textContent = '$' + total;
        document.getElementById('sum-discount').textContent = '輸入優惠券後計算';
        document.getElementById('sum-final').textContent = '$' + total + ' (含優惠券後更新)';
      }

      document.getElementById('book-checkin').addEventListener('change', updateBookSummary);
      document.getElementById('book-checkin').addEventListener('input', updateBookSummary);
      document.getElementById('book-checkout').addEventListener('change', updateBookSummary);
      document.getElementById('book-checkout').addEventListener('input', updateBookSummary);

      document.getElementById('camp-book-submit').onclick = async function() {
        const ci = document.getElementById('book-checkin').value;
        const co = document.getElementById('book-checkout').value;
        const coupon = document.getElementById('book-coupon').value.trim();
        const msgEl = document.getElementById('camp-book-msg');

        if (!ci || !co) { msgEl.textContent = '請選擇入住與退房日期'; msgEl.className = 'err'; return; }
        if (new Date(co) <= new Date(ci)) { msgEl.textContent = '退房日期必須晚於入住日期'; msgEl.className = 'err'; return; }

        const ts = Date.now();
        const email = localStorage.getItem('camping_user_email') || '';
        const payload = {
          event_type: 'booking',
          event_id: 'evt-' + ts,
          order_id: 'ord-' + ts,
          ts: ts,
          session_id: 'web-' + ts,
          user_email: email,
          product_id: _bookSpot.spotId,
          product_name: _bookSpot.spotName,
          check_in_date: ci,
          check_out_date: co
        };
        if (coupon) payload.coupon_code = coupon;

        const btn = document.getElementById('camp-book-submit');
        btn.disabled = true; btn.textContent = '預訂中...';
        try {
          const res = await window.fetch(BASE + '/checkout', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if (!res.ok) {
            msgEl.textContent = data.error || data.detail || '預訂失敗';
            msgEl.className = 'err';
            return;
          }
          const nights = data.nights || 1;
          const disc = data.discount_amount > 0 ? '，折扣 -$' + data.discount_amount : '';
          msgEl.textContent = '✅ 預訂成功！' + nights + ' 晚，應付 $' + data.final_total + disc;
          msgEl.className = 'ok';
          // Update summary
          document.getElementById('sum-nights').textContent = nights + ' 晚';
          document.getElementById('sum-unit').textContent = '$' + data.unit_price;
          document.getElementById('sum-total').textContent = '$' + data.total;
          document.getElementById('sum-discount').textContent = data.discount_amount > 0 ? '-$' + data.discount_amount : '$0';
          document.getElementById('sum-final').textContent = '$' + data.final_total;
        } catch(e) {
          msgEl.textContent = '預訂失敗：' + e.message; msgEl.className = 'err';
        } finally {
          btn.disabled = false; btn.textContent = '確認預訂';
        }
      };

      // ── Toast ──
      function showToast(msg) {
        var t = document.createElement('div');
        t.textContent = msg;
        t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);'
          + 'background:#2d6a4f;color:#fff;padding:10px 24px;border-radius:8px;font-size:0.9rem;'
          + 'z-index:10001;box-shadow:0 4px 16px rgba(0,0,0,0.2);max-width:90vw;text-align:center;';
        document.body.appendChild(t);
        setTimeout(function() { t.remove(); }, 3500);
      }

      // ── Hook React buttons ──
      const observer = new MutationObserver(function () {
        document.querySelectorAll('button').forEach(function (btn) {
          if (btn.dataset.campHooked) return;
          const text = btn.textContent.trim();
          if (text === 'Sign in' || text === 'Sign up') {
            btn.dataset.campHooked = '1';
            btn.addEventListener('click', function (e) {
              e.stopPropagation();
              showModal();
              if (text === 'Sign up') document.getElementById('tab-register').click();
              else document.getElementById('tab-login').click();
            });
          }
          if (text === '瀏覽更多') {
            btn.dataset.campHooked = '1';
            btn.addEventListener('click', function (e) { e.stopPropagation(); openBrowseModal(); });
          }
        });
      });
      observer.observe(document.body, { childList: true, subtree: true });

      updateUserBar();
    })();
    </script>
  </body>
</html>
